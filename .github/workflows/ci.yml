name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read
    outputs:
      server: ${{ steps.filter.outputs.server }}
      ui: ${{ steps.filter.outputs.ui }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
            ui:
              - 'ui/**'
            docker:
              - 'Dockerfile'
              - 'server/**'
              - 'ui/**'

  server-lint:
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"
      - run: uv sync --frozen --all-groups
      - run: uv run ruff check app/ tests/
      - run: uv run ruff format --check app/ tests/
      - run: uv run python -m import_deps --check=reimports app/

  server-test:
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"
      - name: Install SurrealDB
        run: |
          curl -sSf https://install.surrealdb.com | sh -s -- --version v2.2.1
          echo "$HOME/.surrealdb" >> $GITHUB_PATH
      - run: uv sync --frozen --all-groups
      - run: uv run pytest --cov=app tests/

  ui-lint-build:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npx eslint .
      - run: npm run test
      - run: npm run build

  docker-build:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t agent-one-ci .

  ci-pass:
    needs: [server-lint, server-test, ui-lint-build, docker-build]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Decide
        run: |
          echo "server-lint: ${{ needs.server-lint.result }}"
          echo "server-test: ${{ needs.server-test.result }}"
          echo "ui-lint-build: ${{ needs.ui-lint-build.result }}"
          echo "docker-build: ${{ needs.docker-build.result }}"
          if [[ "${{ needs.server-lint.result }}" =~ ^(success|skipped)$ ]] && \
             [[ "${{ needs.server-test.result }}" =~ ^(success|skipped)$ ]] && \
             [[ "${{ needs.ui-lint-build.result }}" =~ ^(success|skipped)$ ]] && \
             [[ "${{ needs.docker-build.result }}" =~ ^(success|skipped)$ ]]; then
            echo "All checks passed or were skipped"
          else
            echo "Some checks failed"
            exit 1
          fi
